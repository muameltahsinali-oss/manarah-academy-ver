<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B57" />
    <title>غير متصل — منارة اكاديمي</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
        background: #F9FAFB;
        color: #0F172A;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0; font-size: 0.95rem; color: rgba(15, 23, 42, 0.65); text-align: center; max-width: 22rem; line-height: 1.6; }
      .mark {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        background: linear-gradient(145deg, #FF6B57, #4FA98C);
        margin-bottom: 1.25rem;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.25rem;
        font-size: 0.95rem;
        font-weight: 700;
        border: none;
        border-radius: 4px;
        background: #FF6B57;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="mark" aria-hidden="true"></div>
    <h1>أنت غير متصل</h1>
    <p>تأكد من اتصال الإنترنت ثم أعد المحاولة. الصفحات التي زرتها مؤخراً قد تظل متاحة عند عودة الاتصال.</p>
    <button type="button" onclick="location.reload()">إعادة المحاولة</button>
  </body>
</html>
